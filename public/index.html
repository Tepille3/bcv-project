<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor BCV</title>
    <style>
        :root {
            --blue: #004b93;
            --blue-light: #1a3a6b;
            --orange: #b83b0e;
            --orange-light: #6b2208;
            --green: #2e9e5a;
            --red: #c0392b;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --input-bg: #f3f4f6;
            --border: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --card-bg: #1a1d2e;
            --text: #e8eaf0;
            --text-muted: #8b95a8;
            --input-bg: #252a3d;
            --border: #2d3348;
            --blue-light: #1e4080;
            --orange-light: #7a2e12;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .top-bar {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .app-title { display: flex; flex-direction: column; }
        .app-title h1 { font-size: 1.3rem; font-weight: 700; color: var(--blue); letter-spacing: -0.3px; }
        .app-title span { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 48px;
            height: 28px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .theme-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--blue);
            transition: transform 0.3s;
        }
        [data-theme="dark"] .theme-toggle::after { transform: translateX(20px); background: #f0c040; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            padding: 24px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        [data-theme="dark"] .card { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge.loading { background: rgba(255,193,7,0.15); color: #d4a000; }
        .badge.success { background: rgba(46,158,90,0.15); color: var(--green); }
        .badge.error { background: rgba(192,57,43,0.15); color: var(--red); }
        .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
        .badge.loading::before { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        .currency-select-wrap { position: relative; }
        .currency-select {
            appearance: none;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 7px 32px 7px 12px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            outline: none;
            font-family: inherit;
            transition: background 0.3s, border-color 0.3s;
            min-width: 110px;
        }
        .currency-select:focus { border-color: var(--blue); }
        .currency-select-wrap::after {
            content: '▼';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.55rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .rate-display { text-align: center; margin-bottom: 20px; }
        .rate-currency-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .rate-flag { font-size: 2rem; }
        .rate-code { font-size: 1.1rem; font-weight: 800; color: var(--text); }
        .rate-value {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--blue);
            line-height: 1;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        .rate-value.euro-color { color: var(--orange); }
        .rate-unit { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        .fecha-valor {
            background: var(--input-bg);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }
        .fecha-valor strong { color: var(--blue); }

        .calc-card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 16px;
            text-align: center;
        }

        .calc-direction-tabs {
            display: flex;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
            gap: 4px;
        }
        .calc-dir-tab {
            flex: 1;
            padding: 9px 6px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .calc-dir-tab.active {
            background: var(--card-bg);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .calc-input-wrap {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 4px 14px;
            margin-bottom: 10px;
            border: 2px solid transparent;
            transition: border-color 0.2s, background 0.3s;
        }
        .calc-input-wrap:focus-within { border-color: var(--blue); }
        .calc-input-wrap label { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); min-width: 36px; }
        .calc-input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            padding: 12px 8px;
            outline: none;
            font-family: inherit;
            width: 100%;
            -moz-appearance: textfield;
        }
        .calc-input-wrap input::-webkit-outer-spin-button,
        .calc-input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .calc-input-wrap .currency-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            color: white;
            background: var(--blue);
        }

        .calc-result {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            transition: background 0.3s;
        }
        .calc-result .result-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
        .calc-result .result-value { font-size: 1.6rem; font-weight: 800; color: var(--blue); }
        .calc-result .result-unit { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .calc-result .result-empty { font-size: 0.85rem; color: var(--text-muted); }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { margin-top: auto; padding-top: 20px; font-size: 0.72rem; color: var(--text-muted); text-align: center; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="app-title">
            <h1>Monitor BCV</h1>
            <span>Banco Central de Venezuela</span>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Cambiar tema"></button>
    </div>

    <div class="card">
        <div class="card-top">
            <div id="badge" class="badge loading">
                <span id="badge-icon"></span>
                <span id="badge-text">Conectando...</span>
            </div>
            <div class="currency-select-wrap">
                <select class="currency-select" id="currencySelect" onchange="onCurrencyChange()">
                    <option value="USD">USD — Dólar</option>
                    <option value="EUR">EUR — Euro</option>
                </select>
            </div>
        </div>

        <div class="rate-display">
            <div class="rate-currency-row">
                <span class="rate-flag" id="rate-flag">💵</span>
                <span class="rate-code" id="rate-code">USD</span>
            </div>
            <div class="rate-value" id="main-rate">...</div>
            <div class="rate-unit">Bs por <span id="rate-unit-label">USD</span></div>
        </div>

        <div class="fecha-valor">
            <span>📅</span>
            <span>Fecha Valor: <strong id="fecha-val">—</strong></span>
        </div>
    </div>

    <div class="card calc-card">
        <h3>Conversor</h3>
        <div class="calc-direction-tabs">
            <button class="calc-dir-tab active" id="dir-ves-to" onclick="setCalcDir('ves-to')">VES → <span id="calc-dir1-label">USD</span></button>
            <button class="calc-dir-tab" id="dir-div-to" onclick="setCalcDir('div-to')"><span id="calc-dir2-label">USD</span> → VES</button>
        </div>
        <div id="calc-from" class="calc-input-wrap">
            <label id="calc-from-label">Bs</label>
            <input type="number" id="calc-from-input" placeholder="0,00" inputmode="decimal" oninput="convert()" />
            <span class="currency-badge" id="calc-from-badge">Bs</span>
        </div>
        <div id="calc-to" class="calc-result">
            <div class="result-label" id="calc-to-label">Resultado</div>
            <div class="result-value" id="calc-to-value"><span class="result-empty">—</span></div>
            <div class="result-unit" id="calc-to-unit">USD</div>
        </div>
    </div>

    <div class="footer">Fuente: bcv.org.ve · Actualización automática</div>

    <script>
        const CURRENCY_DATA = {
            USD: { flag: '💵', color: '', unit: 'USD' },
            EUR: { flag: '💶', color: 'euro-color', unit: 'EUR' },
        };

        let allRates = { USD: null, EUR: null };
        let selectedCurrency = 'USD';
        let calcDir = 'ves-to';
        let pollTimer = null;

        function toggleTheme() {
            const isDark = document.body.dataset.theme === 'dark';
            document.body.dataset.theme = isDark ? '' : 'dark';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        function onCurrencyChange() {
            selectedCurrency = document.getElementById('currencySelect').value;
            const data = CURRENCY_DATA[selectedCurrency];
            document.getElementById('rate-flag').textContent = data.flag;
            document.getElementById('rate-code').textContent = selectedCurrency;
            document.getElementById('rate-unit-label').textContent = data.unit;
            document.getElementById('main-rate').className = 'rate-value ' + data.color;
            const rate = allRates[selectedCurrency];
            document.getElementById('main-rate').textContent = rate ? rate : '—';
            document.getElementById('calc-dir1-label').textContent = selectedCurrency;
            document.getElementById('calc-dir2-label').textContent = selectedCurrency;
            convert();
        }

        function setCalcDir(dir) {
            calcDir = dir;
            document.getElementById('dir-ves-to').classList.toggle('active', dir === 'ves-to');
            document.getElementById('dir-div-to').classList.toggle('active', dir === 'div-to');
            document.getElementById('calc-from-input').value = '';
            convert();
        }

        function convert() {
            const val = parseFloat(document.getElementById('calc-from-input').value || '0');
            if (!val || isNaN(val)) {
                document.getElementById('calc-to-value').innerHTML = '<span class="result-empty">—</span>';
                return;
            }
            const rate = allRates[selectedCurrency];
            if (!rate) {
                document.getElementById('calc-to-value').innerHTML = '<span class="result-empty">Sin tasa</span>';
                return;
            }
            let result, unit, label, fromLabel, fromBadge;
            if (calcDir === 'ves-to') {
                result = val / rate;
                unit = selectedCurrency;
                label = val.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Bs → ' + unit;
                fromLabel = 'Bs';
                fromBadge = 'Bs';
            } else {
                result = val * rate;
                unit = 'Bs';
                label = val.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + selectedCurrency + ' → Bs';
                fromLabel = selectedCurrency;
                fromBadge = selectedCurrency;
            }
            document.getElementById('calc-to-label').textContent = label;
            document.getElementById('calc-to-value').textContent = result.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('calc-to-unit').textContent = unit;
            document.getElementById('calc-from-label').textContent = fromLabel;
            document.getElementById('calc-from-badge').textContent = fromBadge;
        }

        function updateUI(data) {
            const badge = document.getElementById('badge');
            const badgeIcon = document.getElementById('badge-icon');
            const badgeText = document.getElementById('badge-text');

            if (data.success && data.monedas) {
                badge.className = 'badge success';
                badgeIcon.innerHTML = '';
                badgeText.textContent = 'Tasa Oficial BCV';

                Object.keys(data.monedas).forEach(key => {
                    const val = data.monedas[key];
                    if (val) allRates[key] = parseFloat(val.replace(',', '.'));
                });

                onCurrencyChange();
            } else {
                badge.className = 'badge error';
                badgeIcon.innerHTML = '';
                badgeText.textContent = 'Sin datos';
                document.getElementById('main-rate').textContent = '—';
                scheduleRetry(30000);
            }
        }

        function scheduleRetry(ms) {
            if (pollTimer) clearTimeout(pollTimer);
            pollTimer = setTimeout(consultarTasa, ms);
        }

        async function consultarTasa() {
            const badge = document.getElementById('badge');
            const badgeIcon = document.getElementById('badge-icon');
            badge.className = 'badge loading';
            badgeIcon.innerHTML = '<span class="spinner"></span>';
            document.getElementById('badge-text').textContent = 'Actualizando...';

            try {
                const response = await fetch('/api/consulta?nocache=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                updateUI(data);
                if (data.ultima_actualizacion) {
                    const fechaTexto = data.ultima_actualizacion
                        .replace(/BCV.*\|\s*/, '').replace(/Fecha valor:\s*/i, '').trim();
                    document.getElementById('fecha-val').textContent = fechaTexto;
                }
                scheduleRetry(5 * 60 * 1000);
            } catch (err) {
                badge.className = 'badge error';
                badgeIcon.innerHTML = '';
                document.getElementById('badge-text').textContent = 'Error de conexión';
                scheduleRetry(30000);
            }
        }

        (function initTheme() {
            document.body.dataset.theme = localStorage.getItem('theme') === 'light' ? '' : 'dark';
        })();
        setTimeout(consultarTasa, 600);
    </script>
</body>
</html>
