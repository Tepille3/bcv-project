<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Divisas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .precio { font-size: 2.5rem; color: #004b93; font-weight: bold; margin: 10px 0; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        small { color: #666; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="badge" class="status loading">Intentando conectar...</div>
        <h2 style="margin:0; color: #333;">Tasa Oficial BCV</h2>
        
        <p style="margin-bottom: 0;">Dólar (USD)</p>
        <div id="usd" class="precio">...</div>
        
        <small id="fecha">Sincronizando con el servidor...</small>
    </div>

    <script>
        async function consultarTasa() {
            const badge = document.getElementById('badge');
            const usdText = document.getElementById('usd');
            const fechaText = document.getElementById('fecha');

            try {
                // El '?nocache=' + Date.now() obliga a Vercel a darnos data fresca
                const response = await fetch('/api/consulta?nocache=' + Date.now());
                const data = await response.json();

                if (data.success) {
                    badge.innerText = "Conexión Exitosa";
                    badge.className = "status success";
                    usdText.innerText = data.monedas.dolar + " Bs";
                    fechaText.innerText = "Actualizado: " + data.ultima_actualizacion;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                badge.innerText = "Error";
                badge.className = "status error";
                fechaText.innerText = "Reintentando...";
                // Reintenta automáticamente en 5 segundos si falla
                setTimeout(consultarTasa, 5000);
            }
        }
        consultarTasa();
    </script>
</body>
</html>
